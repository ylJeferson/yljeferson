<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design - Alinhamento</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      height: 100svh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 82% 54%, #202023 0 13%, transparent 14%),
        radial-gradient(circle at 18% 4%, #151519 0 18%, transparent 19%),
        linear-gradient(145deg, #050506, #151518 60%, #08080a);
      color: #f4f4f6;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
    }
    main {
      width: min(420px, 100vw);
      height: min(680px, 100svh);
      padding: clamp(18px, 4svh, 42px) 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    h1 {
      margin: 0 0 clamp(12px, 2svh, 22px);
      font-size: 25px;
      line-height: 1;
    }
    .bad { margin-top: clamp(18px, 4svh, 42px); }
    .ok::before,
    .bad::before {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      margin-right: 8px;
      border-radius: 5px;
      font-weight: 900;
      line-height: 1;
    }
    .ok::before {
      content: "\2713";
      background: #12c842;
      color: #fff;
    }
    .bad::before {
      content: "\2715";
      color: #ff1010;
      font-size: 29px;
      vertical-align: -3px;
    }
    .aligned, .misaligned {
      display: grid;
      gap: 10px;
      margin-left: 22px;
    }
    .aligned {
      grid-template-columns: 42px 44px 1fr;
      grid-template-rows: 41px repeat(3, 42px);
    }
    .misaligned {
      position: relative;
      height: clamp(175px, 30svh, 205px);
      margin-top: 8px;
    }
    .box { background: #d9d9dc; }
    .a1 { grid-column: 1; grid-row: 1; }
    .a2 { grid-column: 2 / 4; grid-row: 1; }
    .a3 { grid-column: 1; grid-row: 2 / 5; }
    .a4 { grid-column: 2; grid-row: 2 / 5; }
    .a5 { grid-column: 3; grid-row: 2; }
    .a6 { grid-column: 3; grid-row: 3; }
    .a7 { grid-column: 3; grid-row: 4; }
    .m1 { position: absolute; left: 0; top: 0; width: 42px; height: 42px; }
    .m2 { position: absolute; left: 76px; top: -10px; width: 136px; height: 42px; }
    .m3 { position: absolute; left: 22px; top: 55px; width: 42px; height: 138px; }
    .m4 { position: absolute; left: 86px; top: 52px; width: 80px; height: 42px; }
    .m5 { position: absolute; left: 200px; top: 50px; width: 42px; height: 138px; }
    .m6 { position: absolute; left: 74px; top: 108px; width: 80px; height: 42px; }
    .m7 { position: absolute; left: 100px; top: 164px; width: 80px; height: 42px; }
    @media (max-width: 360px), (max-height: 570px) {
      main { padding-inline: 20px; }
      h1 { font-size: 22px; }
      .aligned { grid-template-columns: 36px 38px 1fr; grid-template-rows: 36px repeat(3, 37px); }
      .misaligned { transform: scale(.9); transform-origin: top left; }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="ok">Com alinhamento</h1>
    <section class="aligned" aria-label="Exemplo com alinhamento">
      <div class="box a1"></div><div class="box a2"></div><div class="box a3"></div>
      <div class="box a4"></div><div class="box a5"></div><div class="box a6"></div><div class="box a7"></div>
    </section>
    <h1 class="bad">Sem alinhamento</h1>
    <section class="misaligned" aria-label="Exemplo sem alinhamento">
      <div class="box m1"></div><div class="box m2"></div><div class="box m3"></div>
      <div class="box m4"></div><div class="box m5"></div><div class="box m6"></div><div class="box m7"></div>
    </section>
  </main>
</body>
</html>
