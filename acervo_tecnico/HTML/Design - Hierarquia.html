<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design - Hierarquia</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      height: 100svh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 86% 58%, #19191d 0 25%, transparent 26%),
        radial-gradient(circle at 28% 6%, #151519 0 18%, transparent 19%),
        #050506;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
    }
    main {
      width: min(435px, 100vw);
      height: min(620px, 100svh);
      padding: clamp(16px, 3svh, 28px) 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }
    h1 {
      margin: 0 0 clamp(30px, 7svh, 52px);
      font-size: 28px;
      line-height: 1;
    }
    h1::before {
      content: "\2713";
      background: #13c83e;
      border-radius: 5px;
      padding: 1px 5px;
      margin-right: 8px;
    }
    .poster {
      min-height: clamp(340px, 66svh, 397px);
      padding: clamp(40px, 10svh, 63px) 35px;
      border-radius: 10px;
      background: #fff;
      color: #20212a;
      text-align: left;
      font-family: "Satoshi", "Inter", "Segoe UI", Arial, Helvetica, sans-serif;
      font-weight: 400;
    }
    .minor {
      margin: 0 0 clamp(32px, 7svh, 47px);
      font-size: 14px;
    }
    .hero {
      margin: 0 0 6px;
      font-size: 43px;
      line-height: .95;
      font-weight: 900;
      letter-spacing: 0;
    }
    .middle {
      margin: 0 0 clamp(32px, 7svh, 47px);
      font-size: 24px;
      line-height: 1.05;
      font-weight: 900;
    }
    .last {
      margin: 0;
      font-size: 20px;
    }
    @media (max-width: 380px), (max-height: 570px) {
      .poster { padding-inline: 28px; }
      .hero { font-size: 39px; }
      .middle { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hierarquia</h1>
    <section class="poster">
      <p class="minor">E por &uacute;ltimo isso</p>
      <p class="hero">Voc&ecirc; vai ler<br>isso primeiro</p>
      <p class="middle">Ent&atilde;o voc&ecirc; vai ler isso</p>
      <p class="last">Depois isso aqui</p>
    </section>
  </main>
</body>
</html>
